<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-Swap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/css.css">
</head>
<body>

    <header class="navbar navbar-expand-lg navbar-dark bg-success">

        <div class="container">

            <a class="navbar-brand" href="index.html">U-Swap</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="paginaPrincipal.html">Inicio</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="miPerfil.html">Mi perfil</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="publicar.html">Publicar</a>
                    </li>

                </ul>

            </div>

        </div>

    </header>

    <main class="container py-5">

        <section class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h1 class="h3 text-success mb-4">Publicar un libro</h1>

                        <form>
                            <div class="mb-3">
                                <label for="titulo" class="form-label">Título del libro</label>
                                <input type="text" class="form-control" id="titulo" placeholder="Ingresa el título del libro">
                            </div>

                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción</label>
                                <textarea class="form-control" id="descripcion" rows="4" placeholder="Descripcion corta de la publicacion "></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoría</label>
                                <select class="form-select" id="categoria">
                                    <option selected>Selecciona una opción</option>
                                    <option value="1">Venta</option>
                                    <option value="2">Intercambio</option>
                                    <option value="3">Donación</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="imagen" class="form-label">Adjuntar imagen</label>
                                <input class="form-control" type="file" id="imagen" accept="image/*">
                            </div>

                            <button type="submit" class="btn btn-success">Publicar</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-dark text-white text-center mt-5 p-3">

        <p class="mb-1">U-Swap</p>

        <p class="mb-0">
            USwap | Universidad Fidelitas | 2026
        </p>

    </footer>

</body>
</html>
